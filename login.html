<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
  <!-- Inicio de sesion -->
  <div class="app">
    <div class="fondo gris">
      <img class="logo" src="logo-NewStart.png" alt="New Start Gym">
      <form class="tarjeta" onsubmit="location.href='disciplinas.html';return false">
        <h2>Welcome to New <span>Start</span> Gym</h2>
        <input class="campo" type="text" placeholder="UserName" required>
        <input class="campo" type="password" placeholder="Password" required>
        <button class="btn" type="submit" style="margin-top:18px">Log In</button>
      </form>
      <a href="registro-1.html" class="link">Forgot your password?</a>
    </div>
  </div>
</body>
</html>
