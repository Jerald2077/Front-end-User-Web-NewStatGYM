<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
  <!-- Registro paso 1: datos personales -->
  <div class="app">
    <div class="fondo gris">
      <img class="logo" src="logo-NewStart.png" alt="New Start Gym">
      <form class="tarjeta" onsubmit="location.href='registro-2.html';return false">
        <h2>Welcome to New <span>Date</span> Gym</h2>
        <input class="campo" type="text" placeholder="Fecha de nacimiento" required>
        <input class="campo" type="text" placeholder="DNI" required>
        <input class="campo" type="tel" placeholder="Telefono" required>
        <button class="btn" type="submit" style="margin-top:18px">Next</button>
      </form>
      <a href="login.html" class="link">Forgot your password?</a>
    </div>
  </div>
</body>
</html>
