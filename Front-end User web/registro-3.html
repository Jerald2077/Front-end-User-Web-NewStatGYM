<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>
  <link rel="stylesheet" href="css/estilos.css">
  <style>
    .foto {
      width: 220px; height: 220px; border-radius: 50%;
      background: #8a8a8a center/cover; margin: 40px auto;
      display: flex; align-items: center; justify-content: center;
      font-size: 90px; color: #555; cursor: pointer;
    }
    .aviso { text-align: center; font-size: 24px; color: var(--texto-suave); }
  </style>
</head>
<body>
  <!-- Registro paso 3: foto de perfil -->
  <div class="app">
    <div class="contenido" style="display:flex;flex-direction:column;justify-content:center;text-align:center">
      <img class="logo" src="logo-NewStart.png" alt="New Start Gym">
      <label class="foto" id="foto">+</label>
      <input type="file" id="archivo" accept="image/*" hidden>
      <p class="aviso">Coloca tu foto de usuario</p>
      <a href="disciplinas.html" class="btn" style="text-align:center;text-decoration:none;margin-top:30px">Create Account</a>
    </div>
  </div>
  <script>
    // Vista previa de la foto de perfil
    const foto = document.getElementById('foto');
    const archivo = document.getElementById('archivo');
    foto.addEventListener('click', () => archivo.click());
    archivo.addEventListener('change', () => {
      const f = archivo.files[0];
      if (f) { foto.style.backgroundImage = `url(${URL.createObjectURL(f)})`; foto.textContent = ''; }
    });
  </script>
</body>
</html>
