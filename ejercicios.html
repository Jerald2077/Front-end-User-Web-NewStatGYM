<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicios</title>
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- Seleccion y configuracion de ejercicios -->
  <div class="app">
    <div class="contenido" style="padding:0">
      <div class="cabecera">
        <a href="principal.html" class="volver"><i class="fa-solid fa-arrow-left"></i></a>
        <h1 id="titulo"></h1>
        <p>Selecciona tus ejercicios</p>
      </div>
      <div class="chips" id="chips"></div>
      <div class="buscar" style="margin:18px 20px">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input class="buscador" id="buscador" type="search" placeholder="Buscar">
      </div>
      <div id="lista"></div>
    </div>
    <div class="pie"><button class="btn" id="continuar" disabled>Continuar</button></div>
  </div>
  <script src="js/datos.js"></script>
  <script src="js/ejercicios.js"></script>
</body>
</html>
